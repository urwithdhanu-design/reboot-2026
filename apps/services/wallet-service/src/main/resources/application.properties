# Wallet Service
server.port=${PORT:8089}
spring.application.name=wallet-service
gcul.runtime.mode=local
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

gcul.cloud-sql.enabled=false
gcul.h2.url=jdbc:h2:file:./data/wallet-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
gcul.h2.username=sa
gcul.h2.password=
gcul.h2.driver=org.h2.Driver
gcul.cloud-sql.jdbc-url=jdbc:postgresql:///gcul_wallet
gcul.cloud-sql.username=gcul_app
gcul.cloud-sql.password=
gcul.cloud-sql.driver=org.postgresql.Driver
gcul.cloud-sql.instance=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

gcul.jwt.secret=gcul-dev-jwt-secret-change-me-32chars-min
gcul.jwt.expiration-ms=604800000

gcul.kyc-service.url=${GCUL_KYC_SERVICE_URL:http://127.0.0.1:8081}
