# Blockchain Orchestrator Service
server.port=${PORT:8088}
spring.application.name=blockchain-orchestrator-service
gcul.runtime.mode=local
gcul.services.target=local
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

gcul.chain.validator-id=${GCUL_CHAIN_VALIDATOR_ID:gcul-validator-primary}
gcul.chain.validator-secret=${GCUL_CHAIN_VALIDATOR_SECRET:gcul-insurance-chain-dev-secret-change-me}
gcul.chain.peers=${GCUL_CHAIN_PEERS:gcul-policy,gcul-claims,gcul-kyc,gcul-blockchain-orchestrator,gcul-payment}
spring.jpa.show-sql=false

spring.datasource.url=jdbc:h2:file:./data/blockchain-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

gcul.cloud-sql.enabled=false
gcul.h2.url=jdbc:h2:file:./data/blockchain-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
gcul.h2.username=sa
gcul.h2.password=
gcul.h2.driver=org.h2.Driver
gcul.cloud-sql.jdbc-url=jdbc:postgresql:///gcul_blockchain
gcul.cloud-sql.username=gcul_app
gcul.cloud-sql.password=
gcul.cloud-sql.driver=org.postgresql.Driver
gcul.cloud-sql.instance=

gcul.claims-service.url=${GCUL_CLAIMS_SERVICE_URL:http://127.0.0.1:8085}
gcul.notification-service.url=${GCUL_NOTIFICATION_SERVICE_URL:http://127.0.0.1:8084}
gcul.blockchain-service.url=${GCUL_BLOCKCHAIN_SERVICE_URL:http://127.0.0.1:8088}
gcul.payment-service.url=${GCUL_PAYMENT_SERVICE_URL:http://127.0.0.1:8083}

# Python GCUL sidecar (packages/gcul-sdk)
gcul.sidecar.enabled=true
gcul.sidecar.url=${GCUL_SIDECAR_URL:http://127.0.0.1:8091}

# Ledger backend: gcul (sidecar) | ethereum (Alchemy + web3j) — see docs/BLOCKCHAIN-INSURER-MINT.md
gcul.ledger.backend=gcul

# Ethereum / Alchemy (Sepolia testnet) — insurer mint only; keys via env / Secret Manager
gcul.ethereum.enabled=false
gcul.ethereum.rpc-url=${ALCHEMY_RPC_URL:}
gcul.ethereum.chain-id=11155111
gcul.ethereum.insurer-private-key=${INSURER_MINT_PRIVATE_KEY:}

gcul.pubsub.enabled=${GCUL_PUBSUB_ENABLED:false}
gcul.pubsub.project-id=${GCUL_PUBSUB_PROJECT:}
gcul.pubsub.topic-prefix=${GCUL_PUBSUB_TOPIC_PREFIX:gcul}
gcul.pubsub.service-id=gcul-blockchain-orchestrator
