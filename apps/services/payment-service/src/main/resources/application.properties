# Payment Service
server.port=${PORT:8083}
spring.application.name=payment-service
gcul.runtime.mode=local
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.datasource.url=jdbc:h2:file:./data/payment-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

gcul.cloud-sql.enabled=false
gcul.h2.url=jdbc:h2:file:./data/payment-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
gcul.h2.username=sa
gcul.h2.password=
gcul.h2.driver=org.h2.Driver
gcul.cloud-sql.jdbc-url=jdbc:postgresql:///gcul_payment
gcul.cloud-sql.username=gcul_app
gcul.cloud-sql.password=
gcul.cloud-sql.driver=org.postgresql.Driver
gcul.cloud-sql.instance=

gcul.jwt.secret=gcul-dev-jwt-secret-change-me-32chars-min

gcul.claims-service.url=http://127.0.0.1:8085
gcul.notification-service.url=http://127.0.0.1:8084
gcul.blockchain-service.url=http://127.0.0.1:8088
gcul.payment-service.url=http://127.0.0.1:8083

gcul.firestore.enabled=${GCUL_FIRESTORE_ENABLED:false}
gcul.firestore.project-id=${GCUL_FIRESTORE_PROJECT:}
gcul.firestore.admin-ttl-seconds=${GCUL_FIRESTORE_ADMIN_TTL:600}
