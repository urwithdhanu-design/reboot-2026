# Notification Service
server.port=${PORT:8084}
spring.application.name=notification-service
gcul.runtime.mode=local
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.datasource.url=jdbc:h2:file:./data/notification-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

gcul.cloud-sql.enabled=false
gcul.h2.url=jdbc:h2:file:./data/notification-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
gcul.h2.username=sa
gcul.h2.password=
gcul.h2.driver=org.h2.Driver
gcul.cloud-sql.jdbc-url=jdbc:postgresql:///gcul_notification
gcul.cloud-sql.username=gcul_app
gcul.cloud-sql.password=
gcul.cloud-sql.driver=org.postgresql.Driver
gcul.cloud-sql.instance=

gcul.claims-service.url=http://127.0.0.1:8085
gcul.notification-service.url=http://127.0.0.1:8084
gcul.blockchain-service.url=http://127.0.0.1:8088
gcul.payment-service.url=http://127.0.0.1:8083

gcul.pubsub.enabled=${GCUL_PUBSUB_ENABLED:false}
gcul.pubsub.project-id=${GCUL_PUBSUB_PROJECT:}
gcul.pubsub.topic-prefix=${GCUL_PUBSUB_TOPIC_PREFIX:gcul}
gcul.pubsub.service-id=gcul-notification
