# Policy service
server.port=${PORT:8082}
spring.application.name=policy-service

gcul.runtime.mode=local
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Database switch ---
# false (default) = local H2 file DB
# true            = Google Cloud PostgreSQL / Cloud SQL
gcul.cloud-sql.enabled=false

# H2 (used when gcul.cloud-sql.enabled=false)
gcul.h2.url=jdbc:h2:file:./data/policy-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
gcul.h2.username=sa
gcul.h2.password=
gcul.h2.driver=org.h2.Driver

# Google Cloud PostgreSQL (used when gcul.cloud-sql.enabled=true)
gcul.cloud-sql.jdbc-url=jdbc:postgresql://127.0.0.1:5432/policy
gcul.cloud-sql.username=policy_user
gcul.cloud-sql.password=change-me
gcul.cloud-sql.driver=org.postgresql.Driver
gcul.cloud-sql.instance=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Stripe (set via env or apps/services/policy-service/.env) ---
# Secret key only — never expose to the browser
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:5173/payment/success}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:5173/payment/cancel}
stripe.currency=gbp

# --- Gmail SMTP (same pattern as Kindred CRM) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

gcul.mail.enabled=${EMAIL_ENABLED:true}
gcul.mail.from-name=${EMAIL_FROM_NAME:Reboot 2026 Insurance platform}
gcul.mail.from-address=${EMAIL_USER:}

gcul.pubsub.enabled=${GCUL_PUBSUB_ENABLED:false}
gcul.pubsub.project-id=${GCUL_PUBSUB_PROJECT:}
gcul.pubsub.topic-prefix=${GCUL_PUBSUB_TOPIC_PREFIX:gcul}
gcul.pubsub.service-id=gcul-policy
