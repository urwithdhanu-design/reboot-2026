server.port=${PORT:8080}
gcul.runtime.mode=cloud
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
gcul.h2.url=jdbc:h2:file:/tmp/gcul/kyc-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.h2.console.enabled=false
gcul.app.web-base-url=${WEB_BASE_URL:https://community-hub-6fb1b.web.app}
gcul.cloud-sql.enabled=${GCUL_CLOUD_SQL_ENABLED:false}
gcul.cloud-sql.instance=${GCUL_CLOUD_SQL_INSTANCE:}
gcul.cloud-sql.jdbc-url=jdbc:postgresql:///${GCUL_DB_NAME:gcul_kyc}
gcul.cloud-sql.username=${GCUL_DB_USER:gcul_app}
gcul.cloud-sql.password=${GCUL_DB_PASSWORD:}
gcul.cloud-sql.driver=org.postgresql.Driver
