# KYC service
server.port=${PORT:8081}
spring.application.name=kyc-service
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Database switch ---
# false (default) = local H2 file DB
# true            = Google Cloud PostgreSQL / Cloud SQL
gcul.cloud-sql.enabled=false

# H2 (used when gcul.cloud-sql.enabled=false)
gcul.h2.url=jdbc:h2:file:./data/kyc-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
gcul.h2.username=sa
gcul.h2.password=
gcul.h2.driver=org.h2.Driver

# Google Cloud PostgreSQL (used when gcul.cloud-sql.enabled=true)
# Example JDBC URL for Cloud SQL Auth Proxy / public IP:
#   jdbc:postgresql://127.0.0.1:5432/kyc
# Or socket factory (set gcul.cloud-sql.instance):
#   jdbc:postgresql:///kyc
gcul.cloud-sql.jdbc-url=jdbc:postgresql://127.0.0.1:5432/kyc
gcul.cloud-sql.username=kyc_user
gcul.cloud-sql.password=change-me
gcul.cloud-sql.driver=org.postgresql.Driver
# Optional Cloud SQL instance connection name: project:region:instance
gcul.cloud-sql.instance=

# H2 console (local only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

gcul.jwt.secret=gcul-dev-jwt-secret-change-me-32chars-min
gcul.jwt.expiration-ms=604800000

# Password reset links point at the customer web app
gcul.app.web-base-url=${WEB_BASE_URL:http://localhost:5173}
gcul.password-reset.expiry-minutes=30

# --- Gmail SMTP (same pattern as Kindred CRM) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:}
spring.mail.password=${EMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

gcul.mail.enabled=${EMAIL_ENABLED:true}
gcul.mail.from-name=${EMAIL_FROM_NAME:Reboot 2026 Insurance platform}
gcul.mail.from-address=${EMAIL_USER:}
