# Chatbot Assistance Service
server.port=8090
spring.application.name=chatbot-assistance-service

# Vector store backend: faiss | pinecone
vector.store=faiss

# FAISS (local) settings
faiss.index.path=./data/faiss.index
faiss.meta.path=./data/faiss_meta.json

# Pinecone settings (used when vector.store=pinecone)
pinecone.api.key=${PINECONE_API_KEY:}
pinecone.index.name=gcul-insurance-rag
pinecone.cloud=aws
pinecone.region=us-east-1
pinecone.namespace=insurance

# Embeddings
embedding.model=sentence-transformers/all-MiniLM-L6-v2

# RAG
rag.top.k=4
rag.min.score=0.15
knowledge.dir=./knowledge

# Optional LLM rewrite (leave blank to use extractive RAG answers)
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# CORS / ingest
chatbot.auto.ingest=true
chatbot.cors.origins=*
