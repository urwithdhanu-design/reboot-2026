[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gcul"
version = "0.1.0"
description = "Reusable Python SDK for Google Cloud Universal Ledger (GCUL)"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [{ name = "GCUL SDK Contributors" }]
keywords = ["gcul", "google-cloud", "universal-ledger", "blockchain", "payments"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "cryptography>=42",
  "google-auth>=2.28",
  "grpcio>=1.62",
  "protobuf>=5",
]

[project.optional-dependencies]
dev = [
  "grpcio-tools>=1.62",
  "pytest>=8",
  "pytest-cov>=5",
]

[project.urls]
Homepage = "https://github.com/googleapis/googleapis/tree/master/google/cloud/universalledger"
Documentation = "https://cloud.google.com/application/web3/universal-ledger"

[tool.hatch.build.targets.wheel]
only-include = ["gcul", "google"]

[tool.hatch.build.targets.wheel.force-include]
"src/gcul" = "gcul"
"src/google" = "google"

[tool.hatch.build.targets.sdist]
include = [
  "src/gcul",
  "src/google",
  "protos",
  "scripts",
  "examples",
  "tests",
  "README.md",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
